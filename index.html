<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Compras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Krona+One&family=Montserrat&family=Numans&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.png" type="image/png" />
  </head>
  <body>
    <main>
      <img src="img/bag.svg" alt="sacola de compras" />

      <form action="">
        <input
          type="text"
          name=""
          id="input-item"
          class="input-item"
          placeholder="Digite o item que deseja adicionar"
        />
        <button class="button-item" id="adicionar-item" type="button" onclick="monstrarMensagem()">
          Salvar item
        </button>
      </form>
      <div class="container-lista">
        <h2>Lista de compras</h2>
        <hr />
      </div>
      <ul id="lista-de-compras">
        <li>
          <div>
            <input type="checkbox" name="" id="checkbox-1" />
            <p>Ração de gato</p>
          </div>
          <p class="texto-data">Segunda-feira (31/10/2022) às 08:30</p>
        </li>
      </ul>
    </main>
    <footer>
      <span>Desenvolvido por Alura. Projeto fictício sem fins comerciais.</span>
    </footer>
    <script defer src="index.js"></script>
  </body>
</html>
